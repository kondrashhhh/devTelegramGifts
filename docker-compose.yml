version: '3.8'

services:
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS="--max-old-space-size=2048"
    restart: unless-stopped
    # Только для разработки - закомментируйте в production
    # volumes:
    #   - ./server:/app
    #   - /app/node_modules
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    ports:
      - "8081:80"   # Меняем на другой порт, чтобы не было конфликта
      # - "443:443"  # Комментируем, если нет SSL
    # Убираем volume монтирование в production - это замедляет сборку!
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro  # Оставить только если есть SSL
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network
    # Добавляем ресурсы для сборки
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  proxy: 
    build: 
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # Только для разработки
    # volumes:
    #   - ./proxy:/app
    #   - /app/node_modules
    networks:
      - app-network
    depends_on:
      - server

networks:
  app-network:
    driver: bridge
