services:
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"  # Порт клиента, а не 80/443
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3000  # Связь с сервером
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network
    # Убираем volumes для production
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro

  proxy: 
    build: 
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./proxy:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
