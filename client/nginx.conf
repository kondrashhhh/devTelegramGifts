server {
    listen 80;
    server_name waffenstars.ru www.waffenstars.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name waffenstars.ru www.waffenstars.ru;

    ssl_certificate /etc/letsencrypt/live/waffenstars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/waffenstars.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прокси для images.giftsbattle.com с подменой заголовков
    location ~ ^/gifts/(.+)$ {
        # Подменяем заголовки, чтобы обойти ddos-guard
        set $target_url "https://images.giftsbattle.com/$1";
        
        proxy_pass $target_url;
        
        # Ключевые заголовки для обхода блокировки
        proxy_set_header Host images.giftsbattle.com;
        proxy_set_header Referer https://images.giftsbattle.com/;
        proxy_set_header Origin https://images.giftsbattle.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_set_header Accept "image/webp,image/apng,image/*,*/*;q=0.8";
        proxy_set_header Accept-Language "ru-RU,ru;q=0.9,en-US;q=0.8,en;q=0.7";
        
        # Убираем заголовки, которые могут вызвать блокировку
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        
        # Добавляем CORS заголовки для ответа
        add_header 'Access-Control-Allow-Origin' 'https://waffenstars.ru' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # Проксируем куки от ddos-guard
        proxy_pass_header Set-Cookie;
        proxy_cookie_domain images.giftsbattle.com waffenstars.ru;
        
        # Таймауты
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        
        # Буферизация
        proxy_buffering off;
        proxy_http_version 1.1;
    }
}
