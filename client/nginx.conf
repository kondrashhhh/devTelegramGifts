server {
    listen 80;
    server_name waffenstars.ru www.waffenstars.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name waffenstars.ru www.waffenstars.ru;

    ssl_certificate /etc/letsencrypt/live/waffenstars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/waffenstars.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ПРОКСИ ДЛЯ IMAGES.GIFTSBATTLE.COM
    # Перехватываем все запросы к images.giftsbattle.com
    location ~ ^/item/(.*)\.tgs$ {
        proxy_pass https://images.giftsbattle.com/item/$1.tgs;
        proxy_set_header Host images.giftsbattle.com;
        proxy_set_header Referer https://waffenstars.ru;
        proxy_set_header Origin https://waffenstars.ru;
        
        # Добавляем CORS заголовки
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        
        # Кэшируем на 1 день (опционально)
        proxy_cache_valid 200 1d;
    }
}
